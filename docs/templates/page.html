{% extends "base.html" %}

{% block body %}
<div class="docs-layout">
  {% include "sidebar.html" %}
  <main class="docs-main">
    <div class="docs-content">
      {% if page.section %}
      <div class="page-eyebrow">{{ page.section | replace("_", " ") | title }}</div>
      {% endif %}
      <h1>{{ page.title }}</h1>
      {{ content }}
    </div>
  </main>
</div>
{% endblock %}
