{% extends "base.html" %}

{% block body %}
<div class="docs-layout">
  {% include "sidebar.html" %}
  <main class="docs-main">
    <div class="docs-content">
      <h1>{{ page.title }}</h1>
      {{ content }}

      {% if section.list %}
      <h2>In This Section</h2>
      <ul class="section-list">
        {{ section.list }}
      </ul>
      {% endif %}
      {{ pagination }}
    </div>
  </main>
</div>
{% endblock %}
