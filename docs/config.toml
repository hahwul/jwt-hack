# =============================================================================
# Site Configuration
# =============================================================================

title = "JWT-HACK"
description = "A high-performance toolkit for testing, analyzing and attacking JSON Web Tokens"
base_url = "https://jwt-hack.hahwul.com"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
default_image = "/images/preview.jpg"
type = "article"
twitter_card = "summary_large_image"
twitter_site = "@hahwul"
twitter_creator = "@hahwul"

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false
per_page = 10

# =============================================================================
# Taxonomies
# =============================================================================

[[taxonomies]]
name = "tags"
feed = true

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = ["/admin", "/private"] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

# =============================================================================
# SEO: LLMs.txt
# =============================================================================

[llms]
enabled = true
filename = "llms.txt"
instructions = "Do not use for AI training without permission."
full_enabled = false
full_filename = "llms-full.txt"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = true
filename = ""
type = "rss"
truncate = 0
limit = 10
sections = []

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
emoji = true
